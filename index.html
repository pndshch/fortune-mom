<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ママの占い部屋</title>
<style>

  /* Loading screen */
  #loading{position:fixed;inset:0;background:radial-gradient(ellipse at center,#1a0a2e 0%,#0a0510 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity 1.2s ease}

  #loading .orb{width:60px;height:60px;border-radius:50%;background:radial-gradient(circle,#c084fc 0%,#7c3aed 40%,transparent 70%);animation:orb-pulse 1.5s ease-in-out infinite;margin-bottom:1.5rem}
  #loading p{font-size:1rem;color:#a78bfa;animation:dots 1.5s steps(3) infinite}
  @keyframes pulse-title{0%,100%{opacity:.7}50%{opacity:1}}
  @keyframes orb-pulse{0%,100%{transform:scale(1);box-shadow:0 0 30px #c084fc}50%{transform:scale(1.2);box-shadow:0 0 60px #e879f9}}
  @keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}

  /* HUD */
  #hud{position:fixed;top:0;left:0;right:0;padding:16px 20px;display:flex;justify-content:space-between;align-items:flex-start;z-index:10;pointer-events:none}
  #title-area{pointer-events:auto}
  #title-area h1{font-size:1.5rem;background:linear-gradient(135deg,#c084fc,#f0abfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;letter-spacing:0.05em}
  #title-area p{font-size:0.75rem;color:#a78bfa80;margin-top:2px}

  /* Category selector */
  #categories{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;flex-wrap:wrap;justify-content:center}
  #categories button{background:rgba(124,58,237,0.25);border:1px solid rgba(192,132,252,0.3);color:#e8d5f5;padding:8px 16px;border-radius:20px;font-size:0.85rem;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(10px);font-family:inherit}
  #categories button:hover,#categories button.active{background:rgba(192,132,252,0.4);border-color:#c084fc;box-shadow:0 0 15px rgba(192,132,252,0.3)}

  /* Hint */
  #hint{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);color:#a78bfa80;font-size:0.8rem;z-index:10;animation:hint-fade 3s ease-in-out infinite;text-align:center;pointer-events:none;white-space:nowrap}
  @keyframes hint-fade{0%,100%{opacity:0.4}50%{opacity:1}}

  /* Fortune overlay */
  #fortune-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.6s ease;background:rgba(10,5,16,0.6);backdrop-filter:blur(4px)}
  #fortune-overlay.visible{opacity:1;pointer-events:auto}

  #fortune-card{max-width:380px;width:90%;padding:3px;border-radius:20px;background:linear-gradient(135deg,#7c3aed,#c084fc,#f0abfc,#7c3aed);background-size:300% 300%;animation:gradient-shift 4s ease infinite;box-shadow:0 0 60px rgba(192,132,252,0.4),0 0 120px rgba(124,58,237,0.2)}
  @keyframes gradient-shift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

  #fortune-inner .luck-level{font-size:2.8rem;margin:8px 0;background:linear-gradient(135deg,#fbbf24,#f59e0b,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

  #tarot-inner{background:linear-gradient(135deg,#1a0a2e,#0f0520);border-radius:18px;padding:30px 24px;text-align:center}
  #tarot-inner .card-name{font-size:1.8rem;margin:8px 0;background:linear-gradient(135deg,#c084fc,#e879f9);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  #tarot-inner .card-meaning{font-size:0.95rem;line-height:1.8;color:#d8c5ee;margin:16px 0 24px}

  #shimmer{position:fixed;inset:0;z-index:99;pointer-events:none;opacity:0;background:radial-gradient(ellipse at center,rgba(192,132,252,0.15) 0%,transparent 70%);transition:opacity 0.3s}
  #shimmer.active{opacity:1;animation:shimmer-anim 0.8s ease-out forwards}

  }
</style>
</head>

// ============================================================
// INCENSE PARTICLES
// ============================================================
function createIncenseParticles() {
  const count = 80;
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const velocities = new Float32Array(count * 3);
  const lifetimes = new Float32Array(count);
  const sizes = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    resetParticle(i, positions, velocities, lifetimes, sizes);
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const material = new THREE.PointsMaterial({
    color: 0xb8a9d4,
    size: 0.06,
    transparent: true,
    opacity: 0.35,
    blending: THREE.AdditiveBlending,
    sizeAttenuation: true,
    depthWrite: false,
  });

  incenseParticles = new THREE.Points(geometry, material);
  incenseParticles._velocities = velocities;
  incenseParticles._lifetimes = lifetimes;
  incenseParticles._sizes = sizes;
  incenseParticles._count = count;
  scene.add(incenseParticles);
}

function resetParticle(i, positions, velocities, lifetimes, sizes) {
  // incense position: somewhere near where incense holder would be
  const baseX = 1.5, baseY = 1.3, baseZ = 0.8;
  positions[i * 3] = baseX + (Math.random() - 0.5) * 0.1;
  positions[i * 3 + 1] = baseY + Math.random() * 0.1;
  positions[i * 3 + 2] = baseZ + (Math.random() - 0.5) * 0.1;

  velocities[i * 3] = (Math.random() - 0.5) * 0.003;
  velocities[i * 3 + 1] = 0.003 + Math.random() * 0.005;
  velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.003;

  lifetimes[i] = Math.random();
  sizes[i] = 0.03 + Math.random() * 0.06;
}

function updateIncenseParticles(dt) {
  if (!incenseParticles) return;
  const pos = incenseParticles.geometry.attributes.position.array;
  const vel = incenseParticles._velocities;
  const life = incenseParticles._lifetimes;
  const sizes = incenseParticles._sizes;
  const count = incenseParticles._count;

  for (let i = 0; i < count; i++) {
    life[i] += dt * 0.15;
    if (life[i] > 1) {
      resetParticle(i, pos, vel, life, sizes);
    }
    pos[i * 3] += vel[i * 3] + Math.sin(life[i] * 5 + i) * 0.0005;
    pos[i * 3 + 1] += vel[i * 3 + 1];
    pos[i * 3 + 2] += vel[i * 3 + 2] + Math.cos(life[i] * 4 + i) * 0.0005;
  }
  incenseParticles.geometry.attributes.position.needsUpdate = true;
}

// ============================================================
// LOAD SCENE
// ============================================================
function loadScene() {
  const loader = new GLTFLoader();
  loader.load(
    'scene.glb',
    (gltf) => {
      const model = gltf.scene;
      scene.add(model);

      // Process objects
      model.traverse((child) => {
        if (!child.isMesh) return;

        child.castShadow = true;
        child.receiveShadow = true;
        const name = child.name.toLowerCase();

        // Crystal ball
        if (name.includes('crystalball') || name.includes('crystal_ball') || name.includes('crystalball')) {
          crystalBallObj = child;
          child.material = child.material.clone();
          child.material.transparent = true;
          child.material.opacity = 0.6;
          child.material.emissive = new THREE.Color(0x7c3aed);
          child.material.emissiveIntensity = 0.3;
          child.material.roughness = 0.05;
          child.material.metalness = 0.1;
          clickableObjects.push(child);
        }

        // Tarot cards
        if (name.includes('tarot') || name.includes('card')) {
          tarotObjs.push(child);
          clickableObjects.push(child);
        }

        // Candle flames - make emissive
        if (name.includes('flame') || name.includes('fire')) {
          child.material = child.material.clone();
          child.material.emissive = new THREE.Color(0xff8c00);
          child.material.emissiveIntensity = 2;
        }

        // Stars and moon decor - emissive
        if (name.includes('star') || name.includes('moon')) {
          child.material = child.material.clone();
          child.material.emissive = new THREE.Color(0x93c5fd);
          child.material.emissiveIntensity = 0.5;
        }

        // Curtains
        if (name.includes('curtain')) {
          child.material = child.material.clone();
          child.material.side = THREE.DoubleSide;
        }
      });

      // If crystal ball not found by name, find the most sphere-like transparent-ish object near center
      if (!crystalBallObj) {
        let bestCandidate = null;
        let bestScore = -Infinity;
        model.traverse((child) => {
          if (!child.isMesh) return;
          const geo = child.geometry;
          if (!geo || !geo.boundingSphere) geo.computeBoundingSphere();
          if (!geo.boundingSphere) return;
          const r = geo.boundingSphere.radius;
          const worldPos = new THREE.Vector3();
          child.getWorldPosition(worldPos);
          const distFromCenter = worldPos.distanceTo(new THREE.Vector3(0, 1.2, 0));
          // score: prefer spherical objects near center-ish, moderate size
          if (r > 0.1 && r < 1 && distFromCenter < 3) {
            const score = -distFromCenter + r * 2;
            if (score > bestScore) {
              bestScore = score;
              bestCandidate = child;
            }
          }
        });
        if (bestCandidate && !crystalBallObj) {
          crystalBallObj = bestCandidate;
          crystalBallObj.material = crystalBallObj.material.clone();
          crystalBallObj.material.transparent = true;
          crystalBallObj.material.opacity = 0.6;
          crystalBallObj.material.emissive = new THREE.Color(0x7c3aed);
          crystalBallObj.material.emissiveIntensity = 0.3;
          if (!clickableObjects.includes(crystalBallObj)) clickableObjects.push(crystalBallObj);
        }
      }

      // Update controls target to crystal ball if found
      if (crystalBallObj) {
        const worldPos = new THREE.Vector3();
        crystalBallObj.getWorldPosition(worldPos);
        controls.target.copy(worldPos);
        crystalGlowLight.position.copy(worldPos).y += 0.2;
      }

      // If we found no tarot cards by name, try to find card-like flat objects on the table
      if (tarotObjs.length === 0) {
        model.traverse((child) => {
          if (!child.isMesh) return;
          const geo = child.geometry;
          if (!geo.boundingBox) geo.computeBoundingBox();
          if (!geo.boundingBox) return;
          const size = new THREE.Vector3();
          geo.boundingBox.getSize(size);
          // Cards are flat rectangular objects
          const dims = [size.x, size.y, size.z].sort((a, b) => a - b);
          if (dims[0] < 0.05 && dims[1] > 0.05 && dims[2] > 0.08) {
            const worldPos = new THREE.Vector3();
            child.getWorldPosition(worldPos);
            if (worldPos.y > 0.5 && worldPos.y < 2.5) {
              tarotObjs.push(child);
              if (!clickableObjects.includes(child)) clickableObjects.push(child);
            }
          }
        });
      }

      // Start intro animation
      startIntroAnimation();

      // Hide loading
      setTimeout(() => {
        loadingEl.classList.add('hidden');
        setTimeout(() => loadingEl.style.display = 'none', 1200);
      }, 500);
    },
    (progress) => {
      // loading progress
    },
    (error) => {
      console.error('Error loading GLB:', error);
      // Still hide loading and show scene (empty but functional)
      loadingEl.classList.add('hidden');
      setTimeout(() => loadingEl.style.display = 'none', 1200);
      controls.enabled = true;
      introAnimDone = true;
    }
  );
}

// ============================================================
// INTRO ANIMATION
// ============================================================
function startIntroAnimation() {
  const startPos = { x: 0, y: 6, z: 12 };
  const endPos = { x: 1.5, y: 2.5, z: 4 };
  const duration = 3.0;
  let elapsed = 0;

  camera.position.set(startPos.x, startPos.y, startPos.z);

  function introTick(dt) {
    elapsed += dt;
    const t = Math.min(elapsed / duration, 1);
    // Ease out cubic
    const ease = 1 - Math.pow(1 - t, 3);

    camera.position.x = startPos.x + (endPos.x - startPos.x) * ease;
    camera.position.y = startPos.y + (endPos.y - startPos.y) * ease;
    camera.position.z = startPos.z + (endPos.z - startPos.z) * ease;

    if (t >= 1) {
      controls.enabled = true;
      introAnimDone = true;
      return true; // done
    }
    return false;
  }

  // Store intro updater
  window._introTick = introTick;
}

// ============================================================
// INTERACTION
// ============================================================
function onPointerDown(event) {
  if (!introAnimDone || isFortuneActive) return;

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(clickableObjects, true);

  if (intersects.length > 0) {
    const hit = intersects[0].object;

    // Check if it's the crystal ball (or a parent/child of it)
    if (isCrystalBall(hit)) {
      triggerCrystalBallFortune();
    } else if (isTarotCard(hit)) {
      triggerTarotReading(hit);
    }
  }
}

function isCrystalBall(obj) {
  if (obj === crystalBallObj) return true;
  let current = obj;
  while (current.parent) {
    if (current.parent === crystalBallObj) return true;
    current = current.parent;
  }
  return false;
}

function isTarotCard(obj) {
  for (const card of tarotObjs) {
    if (obj === card) return true;
    let current = obj;
    while (current.parent) {
      if (current.parent === card) return true;
      current = current.parent;
    }
  }
  return tarotObjs.includes(obj);
}

// ============================================================
// CRYSTAL BALL FORTUNE
// ============================================================
let crystalAnimating = false;
function triggerCrystalBallFortune() {
  if (crystalAnimating) return;
  isFortuneActive = true;
  crystalAnimating = true;

  // Animate crystal ball: glow up and spin
  const startTime = clock.getElapsedTime();
  const animDuration = 2.0;

  function animateCrystal() {
    const elapsed = clock.getElapsedTime() - startTime;
    const t = Math.min(elapsed / animDuration, 1);

    if (crystalBallObj) {
      // Spin
      crystalBallObj.rotation.y += 0.08 * (1 - t);
      // Glow
      crystalBallObj.material.emissiveIntensity = 0.3 + Math.sin(t * Math.PI) * 2;
      crystalGlowLight.intensity = 0.8 + Math.sin(t * Math.PI) * 3;
    }

    if (t < 1) {
      requestAnimationFrame(animateCrystal);
    } else {
      // Reset glow
      if (crystalBallObj) {
        crystalBallObj.material.emissiveIntensity = 0.3;
      }
      crystalGlowLight.intensity = 0.8;
      crystalAnimating = false;

      // Show shimmer
      shimmerEl.classList.add('active');
      setTimeout(() => shimmerEl.classList.remove('active'), 900);

      // Show fortune
      showFortune();
    }
  }
  animateCrystal();
}

function showFortune() {
  const pool = fortunes[selectedCategory];
  const fortune = pool[Math.floor(Math.random() * pool.length)];

  document.getElementById('f-category').textContent = selectedCategory;

  const starCount = { "大吉": 5, "吉": 4, "中吉": 3, "小吉": 2, "凶": 1 };
  const stars = "★".repeat(starCount[fortune.level] || 3) + "☆".repeat(5 - (starCount[fortune.level] || 3));
  document.getElementById('f-stars').textContent = stars;

  const luckEl = document.getElementById('f-luck');
  luckEl.textContent = fortune.level;
  luckEl.className = 'luck-level' + (fortune.level === '凶' ? ' bad' : '');

  document.getElementById('f-message').textContent = fortune.msg;

  fortuneOverlay.classList.add('visible');
}

// ============================================================
// TAROT READING
// ============================================================
function triggerTarotReading(cardObj) {
  isFortuneActive = true;

  // Flip animation
  const startTime = clock.getElapsedTime();
  const animDuration = 1.0;
  const startRotX = cardObj.rotation.x;

  function animateFlip() {
    const elapsed = clock.getElapsedTime() - startTime;
    const t = Math.min(elapsed / animDuration, 1);
    const ease = 1 - Math.pow(1 - t, 3);

    cardObj.rotation.x = startRotX + Math.PI * ease;

    if (t < 1) {
      requestAnimationFrame(animateFlip);
    } else {
      cardObj.rotation.x = startRotX + Math.PI;

      // Shimmer
      shimmerEl.classList.add('active');
      setTimeout(() => shimmerEl.classList.remove('active'), 900);

      // Show tarot reading
      const tarot = tarotCards[Math.floor(Math.random() * tarotCards.length)];
      document.getElementById('t-name').textContent = tarot.name;
      document.getElementById('t-meaning').textContent = tarot.meaning;
      tarotOverlay.classList.add('visible');

      // Reset card rotation after a delay
      setTimeout(() => {
        cardObj.rotation.x = startRotX;
      }, 1500);
    }
  }
  animateFlip();
}

// ============================================================
// ANIMATE
// ============================================================
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Intro animation
  if (window._introTick && !introAnimDone) {
    window._introTick(dt);
  }

  // Controls
  controls.update();

  // Candle flicker
  candleLights.forEach(({ light, baseIntensity, offset }) => {
    const flicker = Math.sin(elapsed * 8 + offset) * 0.15
      + Math.sin(elapsed * 13 + offset * 2) * 0.1
      + Math.sin(elapsed * 21 + offset * 3) * 0.05;
    light.intensity = baseIntensity + flicker;
    // Slight color shift
    const warm = 0.5 + flicker;
    light.color.setRGB(1, 0.6 + warm * 0.1, 0.25 + warm * 0.05);
  });

  // Crystal ball pulse
  if (crystalBallObj && !crystalAnimating) {
    const pulse = Math.sin(elapsed * 1.5) * 0.15 + 0.3;
    crystalBallObj.material.emissiveIntensity = pulse;
    crystalGlowLight.intensity = 0.5 + Math.sin(elapsed * 2) * 0.3;
  }

  // Incense particles
  updateIncenseParticles(dt);

  // Mixer for GLB animations
  if (mixer) mixer.update(dt);

  renderer.render(scene, camera);
}

// ============================================================
// RESIZE
// ============================================================
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ============================================================
// START
// ============================================================
init();
</script>
